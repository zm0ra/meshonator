<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meshonator</title>
  <link rel="stylesheet" href="/static/css/app.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="app-body">
  {% set path = request.url.path if request is defined else '/' %}
  <header class="topbar">
    <div class="topbar-inner">
    <div class="brand-block">
      <div class="brand">Meshonator</div>
      <div class="brand-subtitle">Fleet operations for Meshtastic and MeshCore</div>
    </div>
    {% if user %}
    <nav class="primary-nav">
      <a href="/" class="{{ 'active' if path == '/' else '' }}">Dashboard</a>
      <a href="/nodes" class="{{ 'active' if path.startswith('/nodes') else '' }}">Nodes</a>
      <a href="/map" class="{{ 'active' if path.startswith('/map') else '' }}">Map</a>
      <a href="/groups" class="{{ 'active' if path.startswith('/groups') else '' }}">Groups</a>
      <a href="/jobs" class="{{ 'active' if path.startswith('/jobs') else '' }}">Jobs</a>
      <a href="/audit" class="{{ 'active' if path.startswith('/audit') else '' }}">Audit</a>
      <a href="/settings" class="{{ 'active' if path.startswith('/settings') else '' }}">Settings</a>
    </nav>
    <form method="post" action="/logout"><button class="ghost-button">Logout ({{ user.username }})</button></form>
    {% endif %}
    </div>
  </header>
  <main class="container">{% block content %}{% endblock %}</main>
  <footer class="footer">
    <div>{{ app_name }}</div>
    <div>Build {{ build_version }}</div>
    <div>Rebuild {{ build_date }}</div>
  </footer>
</body>
</html>
