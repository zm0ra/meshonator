services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: meshonator
      POSTGRES_USER: meshonator
      POSTGRES_PASSWORD: meshonator
    ports:
      - "5432:5432"
    volumes:
      - meshonator_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshonator -d meshonator"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://meshonator:meshonator@db:5432/meshonator
      APP_ENV: prod
      SCHEDULER_ENABLED: "true"
    ports:
      - "${MESHONATOR_HTTP_PORT:-8080}:8080"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
    command: >
      sh -c "alembic upgrade head && uvicorn meshonator.api.app:app --host 0.0.0.0 --port 8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 20s
      timeout: 3s
      retries: 5

volumes:
  meshonator_pg_data:
